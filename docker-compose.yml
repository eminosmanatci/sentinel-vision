services:
  db:
    image: ankane/pgvector:latest
    container_name: sentinel-db
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_secret
      POSTGRES_DB: sentinel_vision
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_vision"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel_secret@db:5432/sentinel_vision
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
      - SERVICE_MODE=api
    command: /entrypoint.sh
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-celery-worker
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - yolo_cache:/root/.ultralytics
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel_secret@db:5432/sentinel_vision
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_MODE=worker
    command: /entrypoint.sh
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-celery-beat
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel_secret@db:5432/sentinel_vision
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_MODE=beat
    command: /entrypoint.sh
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  yolo_cache: